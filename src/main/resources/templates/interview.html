<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Собеседование</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 40px;
            color: #1f2937;
        }
        .container {
            max-width: 850px;
            margin: auto;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            color: #1e3a8a;
            margin-bottom: 30px;
        }
        .question-block {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #2563eb;
        }
        h3 {
            margin-top: 0;
            margin-bottom: 15px;
        }
        label {
            margin-right: 30px;
            font-size: 16px;
            cursor: pointer;
        }
        input[type="radio"] {
            margin-right: 8px;
            transform: scale(1.1);
            cursor: pointer;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background: #1d4ed8;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }
        .warning {
            background: #fef3c7;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #92400e;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${vacancy.title}"></h1>

    <div class="warning">
        ⚠️ На каждый вопрос нужно выбрать ответ "Да" или "Нет".
    </div>

    <form th:action="@{/candidate/vacancy/{id}/submit(id=${vacancy.id})}"
          method="post">

        <div class="question-block"
             th:each="q : ${questions}">

            <h3 th:text="${q.questionText}"></h3>

            <label>
                <input type="radio"
                       th:name="${q.id}"
                       value="да"
                       required>
                ✅ Да
            </label>

            <label>
                <input type="radio"
                       th:name="${q.id}"
                       value="нет">
                ❌ Нет
            </label>
        </div>

        <button type="submit">
            ✍️ Завершить собеседование
        </button>
    </form>

    <a href="/candidate/panel" class="back-link">
        ← Вернуться к вакансиям
    </a>
</div>
</body>
</html>
