<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Вопросы</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 40px;
            color: #1f2937;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            color: #1e3a8a;
        }

        h2 {
            margin-top: 30px;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            box-sizing: border-box;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #1d4ed8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th {
            background: #2563eb;
            color: white;
            padding: 14px;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #e5e7eb;
        }

        tr:hover {
            background: #f8fafc;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h1 th:text="${vacancy.title}"></h1>

    <h2>Добавить вопрос</h2>

    <form th:action="@{/hr/vacancy/{id}/questions(id=${vacancy.id})}"
          method="post"
          th:object="${question}">

        <input type="text"
               th:field="*{questionText}"
               placeholder="Введите вопрос">

        <input type="text"
               th:field="*{correctAnswer}"
               placeholder="Правильный ответ (да/нет)">

        <input type="number"
               th:field="*{weight}"
               placeholder="Вес вопроса">

        <button type="submit">
            Добавить вопрос
        </button>

    </form>

    <h2>Список вопросов</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Вопрос</th>
            <th>Ответ</th>
            <th>Вес</th>
        </tr>

        <tr th:each="q : ${questions}">

            <td th:text="${q.id}"></td>

            <td th:text="${q.questionText}"></td>

            <td th:text="${q.correctAnswer}"></td>

            <td th:text="${q.weight}"></td>

        </tr>

    </table>

    <a href="/hr/panel" class="back-link">
        ← Назад
    </a>

</div>

</body>
</html>
