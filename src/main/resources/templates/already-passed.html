<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Собеседование уже пройдено</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            color: #dc2626;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

    </style>
</head>

<body>

<div class="card">

    <h1 th:text="${message}"></h1>

    <a class="btn" href="/candidate/panel">
        Назад
    </a>

</div>

</body>
</html>
