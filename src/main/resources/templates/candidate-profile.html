<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Мой профиль</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            color: #1e3a8a;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            margin-top: 18px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 22px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .back {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #2563eb;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Мой профиль</h1>

        <form method="post" action="/candidate/profile">

            <label>ФИО:</label>

            <input type="text"
                   name="fullName"
                   th:value="${user.fullName}">

            <label>Email:</label>

            <input type="text"
                   name="email"
                   th:value="${user.email}">

            <label>Телефон:</label>

            <input type="text"
                   name="phone"
                   th:value="${user.phone}">

            <label>О себе:</label>

            <textarea name="about"
                      rows="6"
                      th:text="${user.about}">
            </textarea>

            <button class="btn" type="submit">
                Сохранить
            </button>

        </form>

        <a class="back" href="/candidate/panel">
            ← Назад
        </a>

    </div>

</div>

</body>
</html>
