<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
</head>
<body>

<h2>Регистрация</h2>

<form th:action="@{/register}" method="post" th:object="${user}">

    <input type="text"
           th:field="*{login}"
           placeholder="Логин">

    <br><br>

    <input type="password"
           th:field="*{password}"
           placeholder="Пароль">

    <br><br>

    <button type="submit">
        Зарегистрироваться
    </button>

</form>

<a href="/login">Войти</a>

</body>
</html>
