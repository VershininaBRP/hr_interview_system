<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Candidate Panel</title>
</head>
<body>

<h1>Панель кандидата</h1>

<h2>Доступные вакансии</h2>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Название</th>
        <th>Описание</th>
        <th>Действие</th>
    </tr>

    <tr th:each="vacancy : ${vacancies}">

        <td th:text="${vacancy.id}"></td>

        <td th:text="${vacancy.title}"></td>

        <td th:text="${vacancy.description}"></td>

        <td>

            <a th:href="@{/candidate/vacancy/{id}(id=${vacancy.id})}">
                Пройти собеседование
            </a>

        </td>

    </tr>

</table>

<br>

<a href="/logout">
    Выйти
</a>

</body>
</html>
